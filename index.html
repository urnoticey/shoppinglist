<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理智消费 快乐购物</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgZmlsbD0iIzk5RDlEOCIvPjx0ZXh0IHg9IjkwIiB5PSIxMTUxIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iODAiIGZpbGw9IndoaXRlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7vv6mPC90ZXh0Pjwvc3ZnPg==">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#99D9D8">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. 页面大背景：纯正 Tiffany 蓝 */
        body { 
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif; 
            background-color: #99D9D8; 
            color: #4a5a5a; 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* 2. 主容器：半透明 Tiffany 蓝 (磨砂玻璃效果) */
        .container { 
            position: relative; 
            max-width: 950px; 
            margin: 0 auto; 
            background: rgba(153, 217, 216, 0.7); /* Tiffany 蓝半透明 */
            backdrop-filter: blur(15px); /* 磨砂效果 */
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); 
            overflow: hidden; 
        }
        
        /* 专属手帐贴纸装饰 */
        .deco { position: absolute; z-index: 0; opacity: 0.7; user-select: none; }
        .deco-1 { top: 20px; left: 3%; font-size: 2.8rem; transform: rotate(-15deg); } /* 💄 */
        .deco-2 { top: 15px; right: 4%; font-size: 2.5rem; transform: rotate(15deg); } /* 👗 */
        .deco-3 { top: 180px; right: 2%; font-size: 2.2rem; transform: rotate(-10deg); opacity: 0.5;} /* 🎨 */
        .deco-4 { top: 220px; left: 2%; font-size: 2rem; transform: rotate(20deg); opacity: 0.5;} /* 🧴 */
        .deco-5 { bottom: 40px; right: 6%; font-size: 3.5rem; opacity: 0.3; } /* 🛍️ */

        /* 玫瑰粉标题 */
        h1 { 
            color: #D97A8B; 
            font-family: 'STYuanti-SC-Light', 'YouYuan', cursive, sans-serif; 
            font-size: 2.8rem; 
            margin-top: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed rgba(217, 122, 139, 0.3); 
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }
        h2 { color: #5a9a9a; margin-top: 35px; font-size: 1.5rem; font-weight: bold;}
        h1::before { content: '✨ '; font-size: 1.8rem; }
        h1::after { content: ' ✨'; font-size: 1.8rem; }
        
        /* 统计折叠区 */
        #statsSection { display: none; background: rgba(255, 255, 255, 0.5); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.3); position: relative; z-index: 1;}
        .chart-container { position: relative; height: 220px; width: 100%; max-width: 350px; margin: 0 auto; }

        /* 功能按钮区 */
        .data-lab { position: relative; z-index: 1; background: rgba(255, 255, 255, 0.3); border: 1px dashed rgba(217, 122, 139, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn-data { background: rgba(230, 206, 172, 0.8) !important; color: #6d5b5b !important; font-size: 12px; padding: 6px 12px; border-radius: 8px; border: none; font-weight: bold;}
        .btn-stats { background: #D97A8B !important; color: white !important; box-shadow: 0 4px 10px rgba(217, 122, 139, 0.3);}

        /* 愿望单区域 */
        .table-wrapper { position: relative; z-index: 1; width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); }
        table { width: 100%; border-collapse: collapse; background-color: rgba(255, 255, 255, 0.4); min-width: 500px; }
        th, td { border: 1px solid rgba(255,255,255,0.2); padding: 12px; text-align: left; font-size: 13px; }
        th { background-color: rgba(153, 217, 216, 0.8); color: #fff; } 
        
        /* 百宝箱卡片：半透明亮白色 */
        .grid-container { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
        
        .card { border: 1px solid rgba(255,255,255,0.4); border-radius: 15px; background-color: rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px); box-shadow: 0 8px 20px rgba(0,0,0,0.02); overflow: hidden; margin-bottom: 15px; }
        .card h3 { color: #5a9a9a; margin: 0; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; background-color: rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255,255,255,0.2); }
        .btn-add-stock { background: #D97A8B; color: white; padding: 5px 12px; font-size: 12px; border-radius: 20px; border: none; cursor: pointer; } 
        
        li { background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255,255,255,0.1); margin: 10px; border-radius: 10px; font-size: 13px; overflow: hidden; }
        .item-img-large { width: 100%; height: 160px; object-fit: cover; opacity: 0.9; }
        
        .exp-green { color: #27ae60; font-weight: bold; } .exp-orange { color: #d35400; font-weight: bold; } .exp-red { color: #c0392b; font-weight: bold; }
        .input-area { position: relative; z-index: 1; background: rgba(255, 255, 255, 0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; border: 1px solid rgba(255,255,255,0.2); }
        input { padding: 10px; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; outline: none; font-size: 13px; background: rgba(255,255,255,0.8); }
        button { padding: 10px 15px; background: #99D9D8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .modal-content { background: rgba(240, 248, 248, 0.95); backdrop-filter: blur(20px); margin: 15% auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid #fff;}
    </style>
</head>
<body>
<div class="container">
    <div class="deco deco-1">💄</div>
    <div class="deco deco-2">👗</div>
    <div class="deco deco-3">🎨</div>
    <div class="deco deco-4">🧴</div>
    <div class="deco deco-5">🛍️</div>

    <h1>理智消费 快乐购物</h1>
    
    <div class="data-lab">
        <button class="btn-data btn-stats" onclick="toggleStats()">📊 资产分布报告</button>
        <button class="btn-data" onclick="exportToCSV()">📤 导出 Excel</button>
        <button class="btn-data" onclick="exportBackup()">💾 备份码</button>
        <button class="btn-data" onclick="importBackup()">📥 恢复数据</button>
    </div>

    <div id="statsSection">
        <h3>💰 资产数据可视化</h3>
        <div class="chart-container"><canvas id="spendChart"></canvas></div>
    </div>

    <h2>📝 购物愿望单</h2>
    <div class="input-area">
        <input type="text" id="itemName" placeholder="想买什么宝贝？" style="flex:1">
        <input type="number" id="expPrice" placeholder="预期¥" style="width:70px">
        <input type="number" id="actPrice" placeholder="实付¥" style="width:70px">
        <input type="date" id="expDate">
        <button onclick="addShoppingItem()" style="background:#D97A8B">➕ 添加</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th style="width:35px">办</th><th>物品名称</th><th>预期</th><th>实付</th><th>日期/备注</th><th style="width:50px">操作</th></tr></thead>
            <tbody id="shoppingTableBody"></tbody>
            <tfoot id="shoppingTableFoot"></tfoot>
        </table>
    </div>

    <h2>📦 我的百宝箱 (库存)</h2>
    <div class="grid-container" id="inventoryGrid"></div>
</div>

<div id="itemModal" class="modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:#D97A8B; margin-top:0">✨ 录入宝贝</h3>
        <input type="file" id="modalImgFile" accept="image/*" style="display:none" onchange="previewImg(this)">
        <div onclick="document.getElementById('modalImgFile').click()" style="border:2px dashed #D97A8B; height:120px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:15px; border-radius:12px; background:rgba(255,255,255,0.5); cursor:pointer; overflow:hidden">
            <img id="modalPreview" style="display:none; width:100%; height:100%; object-fit:cover">
            <span id="promptTxt" style="color:#D97A8B; font-weight:bold;">📷 点击拍照/选图</span>
        </div>
        <input type="text" id="modalName" placeholder="名称" style="width:100%; margin-bottom:10px; box-sizing:border-box">
        <div id="clothingFields" style="display:none; margin-bottom:10px">
            <input type="text" id="modalAttr" placeholder="颜色/尺码/季节" style="width:100%; box-sizing:border-box">
        </div>
        <div id="normalFields" style="margin-bottom:10px; display:flex; gap:5%">
            <input type="text" id="modalCap" placeholder="规格" style="width:47%">
            <input type="date" id="modalExp" style="width:47%">
        </div>
        <div style="display:flex; gap:5%; margin-bottom:20px">
            <input type="number" id="modalQty" value="1" style="width:47%">
            <input type="number" id="modalPrice" placeholder="价格¥" style="width:47%">
        </div>
        <div style="text-align:right">
            <button style="background:#b0baba; margin-right:10px;" onclick="closeModal()">取消</button>
            <button style="background:#D97A8B" onclick="confirmModal()">✅ 确定存入</button>
        </div>
    </div>
</div>

<script>
    let appData = { 
        shopping: [], 
        inventory: { "🧴 护肤": [], "💄 彩妆": [], "🧼 日用洗护": [], "💊 保健品": [], "🍎 食品": [], "👗 服饰": [] } 
    };
    const STORAGE_KEY = "MyLifeHandBook_Glass_V1";
    let curEdit = { mode:'', cat:'', idx:-1, img:'' }; let myChart = null;

    window.onload = function() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) appData = JSON.parse(saved);
        renderAll();
    };

    function renderAll() {
        renderShopping();
        renderInventory();
        if(document.getElementById("statsSection").style.display === "block") updateChart();
    }

    function toggleStats() {
        let s = document.getElementById("statsSection");
        s.style.display = (s.style.display === "none" || s.style.display === "") ? "block" : "none";
        if(s.style.display === "block") updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('spendChart').getContext('2d');
        const labels = Object.keys(appData.inventory);
        const dataValues = labels.map(cat => appData.inventory[cat].reduce((s, it) => s + (parseFloat(it.price)*(parseInt(it.qty)||1)||0), 0));
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: ['#86C7C7', '#F1CACB', '#E6CEAC', '#D9A5A5', '#B0BABA', '#C3D9D6'],
                    borderWidth: 2, borderColor: '#fff'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    function previewImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxWidth = 400; const scale = maxWidth / img.width;
                canvas.width = maxWidth; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressed = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById("modalPreview").src = compressed;
                document.getElementById("modalPreview").style.display="block";
                document.getElementById("promptTxt").style.display="none";
                curEdit.img = compressed;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function renderShopping() {
        let tbody = document.getElementById("shoppingTableBody");
        let tfoot = document.getElementById("shoppingTableFoot");
        tbody.innerHTML = ""; tfoot.innerHTML = "";
        let sE=0, sA=0;
        appData.shopping.forEach((it, i) => {
            sE += parseFloat(it.expPrice)||0; sA += parseFloat(it.actPrice)||0;
            let tr = document.createElement("tr");
            if(it.isChecked) tr.style.textDecoration = "line-through";
            tr.innerHTML = `<td><input type="checkbox" ${it.isChecked?'checked':''} onchange="toggleCheck(${i})"></td><td>${it.name}</td><td>${it.expPrice}</td><td>${it.actPrice}</td><td>${it.expDate}</td><td><button class="btn-small btn-delete" onclick="delShop(${i})">删</button></td>`;
            tbody.appendChild(tr);
        });
        if(appData.shopping.length > 0) {
            let ft = document.createElement("tr"); ft.style.fontWeight="bold";
            ft.innerHTML = `<td colspan="2" style="text-align:right">统计:</td><td>¥${sE.toFixed(1)}</td><td>¥${sA.toFixed(1)}</td><td colspan="2">省¥${(sE-sA).toFixed(1)}</td>`;
            tfoot.appendChild(ft);
        }
    }

    function renderInventory() {
        let grid = document.getElementById("inventoryGrid"); grid.innerHTML = "";
        for(let cat in appData.inventory) {
            let card = document.createElement("div"); card.className = "card";
            card.innerHTML = `<h3><span>${cat}</span><button class="btn-add-stock" onclick="openModal('add','${cat}')">➕ 添加</button></h3><ul id="list-${cat}"></ul>`;
            grid.appendChild(card);
            let ul = document.getElementById(`list-${cat}`);
            if(appData.inventory[cat].length === 0) {
                ul.innerHTML = `<div style="text-align:center; padding:20px 0; color:rgba(255,255,255,0.6); font-size:12px;">待录入...</div>`;
            } else {
                appData.inventory[cat].forEach((it, i) => {
                    let li = document.createElement("li");
                    let d = it.exp ? (new Date(it.exp) - new Date()) / (1000*60*60*24*30) : 99;
                    let cls = d > 12 ? "exp-green" : (d > 6 ? "exp-orange" : "exp-red");
                    let img = it.img ? `<img src="${it.img}" class="item-img-large">` : `<div style="height:80px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px">无图</div>`;
                    li.innerHTML = `${img}<div style="padding:10px"><strong>${it.name}</strong><br><small>${cat==='👗 服饰'?it.attr:it.cap+' | 效期: <span class="'+cls+'">'+it.exp+'</span>'}</small><br><small>数量: ${it.qty} | ¥${it.price}</small><br><div style="text-align:right; margin-top:5px"><button class="btn-small btn-edit" onclick="openModal('edit','${cat}',${i})">改</button><button class="btn-small btn-delete" onclick="delInv('${cat}',${i})">删</button></div></div>`;
                    ul.appendChild(li);
                });
            }
        }
    }

    function addShoppingItem() {
        let n = document.getElementById("itemName").value; if(!n) return;
        appData.shopping.push({name:n, expPrice:document.getElementById("expPrice").value||0, actPrice:document.getElementById("actPrice").value||0, expDate:document.getElementById("expDate").value||"-", isChecked:false});
        saveData(); document.getElementById("itemName").value="";
    }

    function toggleCheck(i) {
        appData.shopping[i].isChecked = !appData.shopping[i].isChecked;
        if(appData.shopping[i].isChecked) {
            let c = prompt("🎉 存入哪个百宝箱？\n1.护肤 2.彩妆 3.洗护 4.保健 5.食品 6.服饰");
            let cats = ["", "🧴 护肤", "💄 彩妆", "🧼 日用洗护", "💊 保健品", "🍎 食品", "👗 服饰"];
            if(cats[c]) openModal('add', cats[c], -1, appData.shopping[i]);
        }
        saveData();
    }

    function openModal(mode, cat, idx, fromShop=null) {
        curEdit = { mode, cat, idx, img:'' };
        document.getElementById("itemModal").style.display = "block";
        document.getElementById("clothingFields").style.display = cat === "👗 服饰" ? "block" : "none";
        document.getElementById("normalFields").style.display = cat === "👗 服饰" ? "none" : "block";
        if(mode === 'edit') {
            let it = appData.inventory[cat][idx];
            document.getElementById("modalName").value = it.name; document.getElementById("modalQty").value = it.qty; document.getElementById("modalPrice").value = it.price;
            if(cat==="👗 服饰") document.getElementById("modalAttr").value = it.attr;
            else { document.getElementById("modalCap").value = it.cap; document.getElementById("modalExp").value = it.exp; }
            if(it.img) { document.getElementById("modalPreview").src = it.img; document.getElementById("modalPreview").style.display="block"; document.getElementById("promptTxt").style.display="none"; curEdit.img = it.img; }
        } else {
            document.getElementById("modalName").value = fromShop?fromShop.name:"";
            document.getElementById("modalPrice").value = fromShop?fromShop.actPrice:"";
            document.getElementById("modalExp").value = (fromShop&&fromShop.expDate!=="-")?fromShop.expDate:"";
            document.getElementById("modalPreview").style.display="none"; document.getElementById("promptTxt").style.display="block";
        }
    }

    function confirmModal() {
        let it = { name: document.getElementById("modalName").value, qty: document.getElementById("modalQty").value, price: document.getElementById("modalPrice").value, img: curEdit.img };
        if(curEdit.cat === "👗 服饰") it.attr = document.getElementById("modalAttr").value;
        else { it.cap = document.getElementById("modalCap").value; it.exp = document.getElementById("modalExp").value; }
        if(curEdit.mode === 'edit') appData.inventory[curEdit.cat][curEdit.idx] = it;
        else appData.inventory[curEdit.cat].push(it);
        saveData(); closeModal();
    }

    function closeModal() { document.getElementById("itemModal").style.display = "none"; }
    function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); renderAll(); } catch (e) { alert("空间满啦！"); } }
    function delShop(i) { if(confirm("删除此计划？")) { appData.shopping.splice(i,1); saveData(); } }
    function delInv(c, i) { if(confirm("确认删除？")) { appData.inventory[c].splice(i,1); saveData(); } }
    function exportToCSV() {
        let csv = "\ufeff板块,名称,实付,备注\n";
        appData.shopping.forEach(it => csv += `购物,${it.name},${it.actPrice},${it.expDate}\n`);
        let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download="备份.csv"; a.click();
    }
    function exportBackup() { prompt("备份码：", JSON.stringify(appData)); }
    function importBackup() { let s = prompt("粘贴备份码："); if(s) { try{ appData = JSON.parse(s); saveData(); }catch(e){alert("失败");} } }
</script>
</body>
</html>
